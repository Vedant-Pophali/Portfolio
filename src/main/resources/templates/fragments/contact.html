<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<th:block th:fragment="contact-section">
    <section class="section-contact" id="contact">
        <div class="container">
            <div class="section-title-container">
                <h2 class="section-title">Get in Touch</h2>
                <p class="section-subtitle">Let's work together.</p>
            </div>

            <div class="contact-container">
                <!-- Left: Info Box -->
                <div class="contact-info">
                    <h3 class="contact-heading">Let's build something great!</h3>
                    <p class="contact-text">
                        Whether you have an idea, a question, or just want to say hi — feel free to get in touch with me.
                    </p>
                    <div class="contact-socials">
                        <a href="https://www.linkedin.com/in/vedant-pophali/" target="_blank">
                            <i class="fab fa-linkedin"></i>
                        </a>
                        <a href="https://github.com/Vedant-Pophali" target="_blank">
                            <i class="fab fa-github"></i>
                        </a>
                        <a href="mailto:officialvedantpophali2005@gmail.com">
                            <i class="fas fa-envelope"></i>
                        </a>
                    </div>
                </div>

                <!-- Right: Contact Form -->
                <form class="contact-form" action="https://api.web3forms.com/submit" method="post">
                    <input type="hidden" name="access_key" value="f5e66cbb-795a-40a7-bd15-66b7cb47395d">
                    <div class="form-group">
                        <label for="name" class="form-label">Your Name</label>
                        <input type="text" id="name" name="name" placeholder="John Doe" required>
                    </div>

                    <div class="form-group">
                        <label for="email" class="form-label">Your Email</label>
                        <input type="email" id="email" name="email" placeholder="your@email.com" required>
                    </div>

                    <div class="form-group">
                        <label for="message" class="form-label">Your Message</label>
                        <textarea id="message" name="message" placeholder="Type your message here..." rows="5" required></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary">Send Message</button>
                </form>
            </div>
        </div>
    </section>
</th:block>
</html>
