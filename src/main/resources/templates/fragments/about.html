<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<th:block th:fragment="about-section">
    <section class="section about" id="about">
        <div class="container">
<!--            <div class="section-title-container">-->
<!--                <h2 class="section-title">About Me</h2>-->
<!--                <p class="section-subtitle">Get to know me better</p>-->
<!--            </div>-->
            <div class="about-container">
                <div class="about-content">
                    <div class="about-tagline">
                        <h3 class="about-heading">My Background</h3>
                        <p class="about-text">Something about my academic or professional journey.</p>
                        <p class="about-text">A key project or passion that defines my work ethic.</p>
                        <p class="about-text">Values or experiences that shaped my mindset.</p>
                    </div>
                </div>

                <!-- ===============================
                     Skills Section with Image
                     =============================== -->
                <section class="skills-section-wrapper">

                    <!-- Skills Left -->
                    <div class="skills-section-box">
                        <h3 class="skills-heading">Tech Stack</h3>
                        <div class="skills-container">

                            <!-- Java -->
                            <div class="skill-item">
                                <div class="skill-icon"><i class="fab fa-java"></i></div>
                                <div class="skill-name">Java</div>
                            </div>

                            <!-- Spring Boot -->
                            <div class="skill-item">
                                <div class="skill-icon"><i class="fas fa-leaf"></i></div>
                                <div class="skill-name">Spring Boot</div>
                            </div>

                            <!-- Spring AI -->
                            <div class="skill-item">
                                <div class="skill-icon"><i class="fas fa-brain"></i></div>
                                <div class="skill-name">Spring AI</div>
                            </div>

                            <!-- React -->
                            <div class="skill-item">
                                <div class="skill-icon"><i class="fab fa-react"></i></div>
                                <div class="skill-name">React</div>
                            </div>

                            <!-- MongoDB -->
                            <div class="skill-item">
                                <div class="skill-icon"><i class="fas fa-leaf"></i></div>
                                <div class="skill-name">MongoDB</div>
                            </div>

                            <!-- MySQL -->
                            <div class="skill-item">
                                <div class="skill-icon"><i class="fas fa-server"></i></div>
                                <div class="skill-name">MySQL</div>
                            </div>

                            <!-- REST APIs -->
                            <div class="skill-item">
                                <div class="skill-icon"><i class="fas fa-plug"></i></div>
                                <div class="skill-name">REST APIs</div>
                            </div>

                            <!-- Git -->
                            <div class="skill-item">
                                <div class="skill-icon"><i class="fab fa-git-alt"></i></div>
                                <div class="skill-name">Git</div>
                            </div>

                            <!-- Agile -->
                            <div class="skill-item">
                                <div class="skill-icon"><i class="fas fa-project-diagram"></i></div>
                                <div class="skill-name">Agile</div>
                            </div>

                            <!-- WebSocket -->
                            <div class="skill-item">
                                <div class="skill-icon"><i class="fas fa-wave-square"></i></div>
                                <div class="skill-name">WebSocket</div>
                            </div>

                            <!-- JIRA -->
                            <div class="skill-item">
                                <div class="skill-icon"><i class="fas fa-tasks"></i></div>
                                <div class="skill-name">JIRA</div>
                            </div>

                            <!-- Postman -->
                            <div class="skill-item">
                                <div class="skill-icon"><i class="fas fa-flask"></i></div>
                                <div class="skill-name">Postman</div>
                            </div>

                        </div>
                    </div>


                    <!-- Image Right -->
                    <div class="about-visual">
                        <div class="about-image-container">
                            <div class="about-image-bg"></div>
                            <img src="/images/PC%20Setup.jpeg" alt="PC Setup" />
                        </div>
                    </div>
                </section>
                <!-- End Skills Section -->
            </div> <!-- End about-container -->
        </div> <!-- End container -->
    </section>
</th:block>
</html>
